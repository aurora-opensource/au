name: cuda-ubuntu

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  cuda-build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@3d45d157f327c09c04b50ee6ccdea2d9d017ec76 # v0.2.35
        id: cuda-toolkit
        with:
          cuda: "12.6.3"
          method: network

      - name: Verify CUDA installation
        run: nvcc --version

      - name: Build and test CUDA target
        run: bazel test //au/cuda:cuda_test --config=gcc12 --action_env=PATH=/usr/bin:/bin:$PATH
