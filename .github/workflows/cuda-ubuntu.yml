name: cuda-ubuntu

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  cuda-compile-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b #v4.1.5

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@dc581bda54494dc20d7fc12b6c98e7a15182216a #v0.2.19
        with:
          cuda: '12.6.3'
          method: 'network'
          sub-packages: '["nvcc"]'

      - name: Verify nvcc installation
        run: nvcc --version

      - name: Compile CUDA test
        run: nvcc -std=c++14 -I. --compile au/cuda_test.cu -o /tmp/cuda_test.o
